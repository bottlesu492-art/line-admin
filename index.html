<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>管理後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1 id="title">管理後台</h1>
  <p id="status">初始化中...</p>

  <script>
  const LIFF_ID = "2009831016-9xQbInBY"; //(備註功能) 你的 LIFF ID

  async function main() {
    try {
      document.getElementById("status").textContent = "1. 開始初始化 LIFF...";

      await liff.init({
        liffId: LIFF_ID,
        withLoginOnExternalBrowser: true
      });

      document.getElementById("status").textContent = "2. LIFF 初始化成功";

      // (備註功能) 外部瀏覽器若尚未登入，主動登入
      if (!liff.isLoggedIn()) {
        document.getElementById("status").textContent = "3. 尚未登入，跳轉 LINE Login...";
        liff.login();
        return;
      }

      document.getElementById("status").textContent = "4. 已登入，讀取個人資料...";
      const profile = await liff.getProfile();
      const userId = profile.userId;

      document.getElementById("status").textContent =
        "5. 取得 userId：" + userId;

      google.script.run
        .withSuccessHandler(function(isAdmin) {
          if (isAdmin) {
            document.getElementById("title").textContent = "管理後台";
            document.getElementById("status").textContent =
              "✅ 歡迎進入管理後台：" + profile.displayName;
          } else {
            document.getElementById("title").textContent = "無權限";
            document.getElementById("status").textContent =
              "❌ 你不在管理員名單內\nuserId：" + userId;
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById("title").textContent = "系統錯誤";
          document.getElementById("status").textContent =
            "❌ checkLiffAdmin 失敗：" + (err && err.message ? err.message : JSON.stringify(err));
        })
        .checkLiffAdmin(userId);

    } catch (err) {
      document.getElementById("title").textContent = "初始化錯誤";
      document.getElementById("status").textContent =
        "❌ LIFF 初始化失敗：" + (err && err.message ? err.message : JSON.stringify(err));
    }
  }

  main();
</script>
</body>
</html>
