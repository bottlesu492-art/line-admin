<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>管理後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
  :root {
    --primary: #586D80;
    --accent: #CCC5BC;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text-main: #2E3A45;
    --text-sub: #666666;
  }

  body {
    font-family: Arial, "Noto Sans TC", sans-serif;
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--text-main);
  }

  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,.08);
    margin-bottom: 16px;
  }

  .title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .sub {
    color: var(--text-sub);
    margin-bottom: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  button {
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 16px;
    font-weight: bold;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }

  .back {
    background: var(--accent);
    color: var(--text-main);
    margin-bottom: 12px;
  }

  .hidden {
    display: none;
  }

  .item {
    padding: 12px 0;
    border-bottom: 1px solid #eee;
    font-size: 16px;
  }

  .highlight {
    background: var(--accent);
    border-radius: 12px;
    padding: 12px;
    font-weight: bold;
    margin-top: 10px;
  }
    .center {
  text-align: center;
}

.icon {
  font-size: 40px;
  margin-bottom: 8px;
}
.item:last-child {
  border-bottom: none;
} 
/* (備註功能) 補打卡橫向卡片區 */
.patch-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 6px;
  scroll-snap-type: x proximity;
}

.patch-card {
  min-width: 260px;
  max-width: 260px;
  flex: 0 0 auto;
  scroll-snap-align: start;
}

.patch-card .title {
  font-size: 18px;
}

.patch-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.patch-btn {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.patch-btn.approve {
  background: #4CAF50;
  color: #fff;
}

.patch-btn.reject {
  background: #D9534F;
  color: #fff;
}
.patch-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  gap: 12px;
}

.patch-count {
  background: var(--accent);
  color: var(--text-main);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
}

.empty-card {
  text-align: center;
  padding: 28px 18px;
}

.empty-icon {
  font-size: 40px;
  margin-bottom: 10px;
}    
</style>
</head>
<body>
  <div id="loginPage" class="card">
    <div class="title">管理後台</div>
    <div id="status" class="sub">初始化中...</div>
  </div>

  <div id="homePage" class="hidden">
    <div class="card">
      <div class="title">管理後台</div>
      <div id="welcomeText" class="sub"></div>
      <div class="grid">
        <button onclick="showTodayPage()">今日管理</button>
        <button onclick="showLeavePage()">排休管理</button>
        <button onclick="showPatchPage()">補打卡管理</button>
        <button onclick="showEmployeePage()">員工薪資</button>
        <button onclick="showSummaryPage()">人事總額</button>
        <button onclick="showExpensePage()">支出明細</button>
      </div>
    </div>
  </div>

  <div id="contentPage" class="hidden">
    <button class="back" onclick="goHome()">← 返回首頁</button>
    <div class="card">
      <div id="contentTitle" class="title"></div>
      <div id="contentBody"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009831016-9xQbInBY";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzPOpbhtiLEKyomI4vbt65Qih-DzPSUR1v_sZcVwM4QpFGIvqz7UxA-l-03XZAdv_2y/exec";

    function loadUI() {
  window.handleUI = function(data) {
    document.documentElement.style.setProperty('--primary', data.button || data.primary || '#586D80');
    document.documentElement.style.setProperty('--accent', data.accent || '#CCC5BC');
    document.documentElement.style.setProperty('--text-main', data.title || '#2E3A45');
    document.documentElement.style.setProperty('--text-sub', data.subText || '#666666');
    document.documentElement.style.setProperty('--card', data.cardBg || '#ffffff');
    document.documentElement.style.setProperty('--bg', data.hintBg || '#f5f7fa');
  };

  const script = document.createElement("script");
  script.src = GAS_URL + "?action=getUI&callback=handleUI";
  document.body.appendChild(script);
}
    
    let currentProfile = null;
    let currentUserId = "";

    async function main() {
      try {
        document.getElementById("status").textContent = "1. 開始初始化 LIFF...";
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        document.getElementById("status").textContent = "2. LIFF 初始化成功";

        if (!liff.isLoggedIn()) {
          document.getElementById("status").textContent = "3. 尚未登入，準備登入...";
          liff.login();
          return;
        }

        document.getElementById("status").textContent = "4. 已登入，讀取個人資料...";
        currentProfile = await liff.getProfile();
        currentUserId = currentProfile.userId;

        document.getElementById("status").textContent =
          "5. 驗證管理員中...";

        window.handleAdminCheck = function(data) {
          if (data.ok && data.isAdmin) {
            document.getElementById("loginPage").classList.add("hidden");
            document.getElementById("homePage").classList.remove("hidden");
            document.getElementById("welcomeText").textContent =
              "歡迎，" + currentProfile.displayName;
            loadUI();
          } else {
            document.getElementById("status").textContent =
              "❌ 你不在管理員名單內";
          }
        };

        const script = document.createElement("script");
        script.src = GAS_URL
          + "?action=checkAdmin"
          + "&userId=" + encodeURIComponent(currentUserId)
          + "&callback=handleAdminCheck";

        script.onerror = function() {
          document.getElementById("status").textContent =
            "❌ 管理員驗證失敗";
        };

        document.body.appendChild(script);

      } catch (err) {
        document.getElementById("status").textContent =
          "❌ 初始化錯誤：" + (err && err.message ? err.message : JSON.stringify(err));
      }
    }

    function goHome() {
      document.getElementById("contentPage").classList.add("hidden");
      document.getElementById("homePage").classList.remove("hidden");
    }

    function showContent(title, html) {
      document.getElementById("homePage").classList.add("hidden");
      document.getElementById("contentPage").classList.remove("hidden");
      document.getElementById("contentTitle").textContent = title;
      document.getElementById("contentBody").innerHTML = html;
    }

    function showTodayPage() {
      showContent("今日管理", "之後接今日記錄 / 今日異常");
    }

    function showLeavePage() {
  window.handleLeaveCalendar = function(data) {
    if (!data || !data.ok) {
      showContent("排休管理", "❌ 讀取失敗");
      return;
    }

    const html = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;">
        <div class="sub" style="margin-bottom:0;">本月與次月排休日曆</div>
        <button onclick="deleteLeave()" style="padding:10px 14px;font-size:14px;">刪除排休</button>
      </div>

      ${renderLeaveCalendar(data.thisMonth)}
      ${renderLeaveCalendar(data.nextMonth)}
    `;

    showContent("排休管理", html);
  };

  const script = document.createElement("script");
  script.src = GAS_URL + "?action=getLeaveCalendar&callback=handleLeaveCalendar&_t=" + Date.now();
  script.onerror = function() {
    showContent("排休管理", "❌ 讀取失敗");
  };
  document.body.appendChild(script);
}
function renderLeaveCalendar(monthData) {
  const year = monthData.year;
  const month = monthData.month;
  const leaves = monthData.leaves || {};

  const firstDay = new Date(year, month - 1, 1);
  const lastDate = new Date(year, month, 0).getDate();
  const startWeekday = firstDay.getDay();
  const weekdays = ["日", "一", "二", "三", "四", "五", "六"];

  let html = `
    <div class="card" style="margin-bottom:16px;">
      <div class="title" style="font-size:20px;">${month}月</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;">
  `;

  weekdays.forEach(d => {
    html += `
      <div style="
        text-align:center;
        font-weight:bold;
        padding:8px 4px;
        background:var(--accent);
        border-radius:10px;
      ">${d}</div>
    `;
  });

  for (let i = 0; i < startWeekday; i++) {
    html += `<div></div>`;
  }

  for (let day = 1; day <= lastDate; day++) {
    const mm = String(month).padStart(2, "0");
    const dd = String(day).padStart(2, "0");
    const key = `${year}-${mm}-${dd}`;
    const names = leaves[key] || [];

    html += `
      <div style="
        min-height:110px;
        background:var(--card);
        border:1px solid #e8e8e8;
        border-radius:12px;
        padding:8px;
        box-sizing:border-box;
        display:flex;
        flex-direction:column;
        align-items:flex-start;
      ">
        <div style="font-weight:bold;margin-bottom:6px;">${day}</div>
        <div style="
          font-size:13px;
          line-height:1.5;
          color:var(--text-main);
          width:3.2em;
          white-space:normal;
          word-break:keep-all;
        ">
          ${names.join("<br>")}
        </div>
      </div>
    `;
  }

  html += `</div></div>`;
  return html;
}

function deleteLeave() {
  const date = prompt("請輸入日期（格式：2026-04-23）");
  if (!date) return;

  window.handleLeaveNamesByDate = function(res) {
    if (!res.ok) {
      alert("❌ 讀取失敗");
      return;
    }

    if (!res.names || res.names.length === 0) {
      alert("這一天沒有排休資料");
      return;
    }

    let message = "請輸入要刪除的姓名：\n\n";
    message += res.names.map((name, i) => `${i + 1}. ${name}`).join("\n");

    const picked = prompt(message);
    if (!picked) return;

    let finalName = picked.trim();
    const idx = Number(finalName);

    if (!isNaN(idx) && idx >= 1 && idx <= res.names.length) {
      finalName = res.names[idx - 1];
    }

    window.handleDeleteLeave = function(delRes) {
      if (delRes.ok) {
        alert("刪除成功");
        showLeavePage();
      } else {
        alert("❌ " + delRes.message);
      }
    };

    const script2 = document.createElement("script");
    script2.src = GAS_URL
      + "?action=deleteLeave"
      + "&name=" + encodeURIComponent(finalName)
      + "&date=" + encodeURIComponent(date)
      + "&callback=handleDeleteLeave"
      + "&_t=" + Date.now();
    document.body.appendChild(script2);
  };

  const script = document.createElement("script");
  script.src = GAS_URL
    + "?action=getLeaveNamesByDate"
    + "&date=" + encodeURIComponent(date)
    + "&callback=handleLeaveNamesByDate"
    + "&_t=" + Date.now();
  document.body.appendChild(script);
}

function renderPatchPendingPage(data) {
  if (!data || !data.ok) {
    showContent("補打卡管理", "❌ 讀取失敗");
    return;
  }

  let html = `
    <div class="patch-header">
      <div class="sub">待審核補打卡</div>
      <div class="patch-count">共 ${data.count || 0} 筆</div>
    </div>
  `;

  if (!data.items || data.items.length === 0) {
    html += `
      <div class="card empty-card">
        <div class="empty-icon">✅</div>
        <div class="title" style="font-size:20px;">目前沒有待審核補打卡</div>
        <div class="sub" style="margin-bottom:0;">上個月與本月的待審核資料都已處理完成</div>
      </div>
    `;
    showContent("補打卡管理", html);
    return;
  }

  html += `<div class="patch-scroll">`;

  data.items.forEach(item => {
    html += `
      <div class="card patch-card" id="patch-card-${item.row}">
        <div class="title">👤 ${item.name}</div>
        <div class="item">📂 ${item.type}</div>
        <div class="item">📅 ${item.dateText}</div>
        <div class="item">📍 ${item.location || "未填"}</div>
        <div class="item">📝 ${item.reason || "未填"}</div>

        <div class="patch-actions">
          <button class="patch-btn approve" onclick="approvePatchCard(${item.row})">核准</button>
          <button class="patch-btn reject" onclick="rejectPatchCard(${item.row})">駁回</button>
        </div>
      </div>
    `;
  });

  html += `</div>`;

  showContent("補打卡管理", html);
}
 function refreshPatchPage() {
  window.handlePatchPendingRefresh = function(data) {
    renderPatchPendingPage(data);
  };

  const script = document.createElement("script");
  script.src = GAS_URL
    + "?action=getPatchPendingList"
    + "&callback=handlePatchPendingRefresh"
    + "&_t=" + Date.now();
  document.body.appendChild(script);
}

function approvePatchCard(row) {
  window.handleApprovePatch = function(data) {
    if (data.ok) {
      refreshPatchPage();
    } else {
      alert("❌ " + (data.message || "核准失敗"));
    }
  };

  const script = document.createElement("script");
  script.src = GAS_URL
    + "?action=approvePatchWeb"
    + "&row=" + encodeURIComponent(row)
    + "&userId=" + encodeURIComponent(currentUserId)
    + "&callback=handleApprovePatch"
    + "&_t=" + Date.now();
  document.body.appendChild(script);
}

function rejectPatchCard(row) {
  const reason = prompt("請輸入駁回原因");
  if (reason === null) return;

  const finalReason = reason.trim();
  if (!finalReason) {
    alert("請輸入駁回原因");
    return;
  }

  window.handleRejectPatch = function(data) {
    if (data.ok) {
      refreshPatchPage();
    } else {
      alert("❌ " + (data.message || "駁回失敗"));
    }
  };

  const script = document.createElement("script");
  script.src = GAS_URL
    + "?action=rejectPatchWeb"
    + "&row=" + encodeURIComponent(row)
    + "&userId=" + encodeURIComponent(currentUserId)
    + "&reason=" + encodeURIComponent(finalReason)
    + "&callback=handleRejectPatch"
    + "&_t=" + Date.now();
  document.body.appendChild(script);
}   
    function showEmployeePage() {
      showContent("員工薪資", "之後接員工清單與個人薪資資料");
    }

function showSummaryPage() {
  window.handleSummary = function(data) {
    const html = `
      <div class="grid">

        <div class="card center">
          <div class="icon">💰</div>
          <div class="sub">管理員薪資</div>
          <div class="title">${data.managerSalary}</div>
        </div>

        <div class="card center">
          <div class="icon">👷</div>
          <div class="sub">員工薪資</div>
          <div class="title">${data.employeeSalary}</div>
        </div>

        <div class="card center">
          <div class="icon">💳</div>
          <div class="sub">代墊</div>
          <div class="title">${data.expenseTotal}</div>
        </div>

        <div class="card center">
          <div class="icon">🍱</div>
          <div class="sub">餐飲</div>
          <div class="title">${data.foodTotal}</div>
        </div>

        <div class="card center">
          <div class="icon">🧰</div>
          <div class="sub">工具</div>
          <div class="title">${data.toolTotal}</div>
        </div>

        <div class="card center">
          <div class="icon">📦</div>
          <div class="sub">其他</div>
          <div class="title">${data.otherTotal}</div>
        </div>

      </div>

      <div class="highlight">🔥 總支出：${data.grandTotal}</div>
    `;

    showContent("人事總額", html);
  };

  const script = document.createElement("script");
  script.src = GAS_URL + "?action=getSummary&callback=handleSummary";
  script.onerror = function() {
    showContent("人事總額", "❌ 讀取失敗");
  };
  document.body.appendChild(script);
}
function showExpensePage() {
  window.handleExpense = function(data) {
    let html = "";

    const names = Object.keys(data).sort();

    names.forEach((name, index) => {
      const list = [...data[name]].reverse();
      const total = list.reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const detailId = "expense-detail-" + index;

      html += `
        <div class="card">
          <div
            onclick="toggleExpenseDetail('${detailId}')"
            style="
              display:flex;
              justify-content:space-between;
              align-items:center;
              cursor:pointer;
              gap:12px;
            "
          >
            <div>
              <div class="title" style="margin-bottom:4px;">👤 ${name} ▾</div>
              <div class="sub" style="margin-bottom:0;">共 ${list.length} 筆</div>
            </div>

            <div style="text-align:right;">
              <div class="sub" style="margin-bottom:4px;">支出小計</div>
              <div style="font-size:22px;font-weight:bold;color:var(--text-main);">
                $${total}
              </div>
              <div style="font-size:12px;color:var(--text-sub);">點擊展開 / 收合</div>
            </div>
          </div>

          <div id="${detailId}" style="display:none; margin-top:14px;">
      `;

      list.forEach(item => {
        let typeColor = "#666";
        let typeIcon = "📦";

        if (item.type === "餐飲") {
          typeColor = "#4CAF50";
          typeIcon = "🍱";
        } else if (item.type === "工具") {
          typeColor = "#2196F3";
          typeIcon = "🧰";
        } else if (item.type === "其他") {
          typeColor = "#9E9E9E";
          typeIcon = "📦";
        }

        html += `
          <div class="item">
            <div style="color:${typeColor};font-weight:bold;">
              ${typeIcon} ${item.type || "未分類"}
            </div>

            <div style="font-size:13px;color:#999;">
              ${item.time || ""}
            </div>

            <div>
              ${item.note || ""}
            </div>

            <div style="font-weight:bold;margin-top:4px;">
              $${item.amount || 0}
            </div>
          </div>
        `;
      });

      html += `
          </div>
        </div>
      `;
    });

    if (!html) {
      html = "目前沒有支出明細";
    }

    showContent("支出明細", html);
  };

  const script = document.createElement("script");
  script.src = GAS_URL + "?action=getExpenseList&callback=handleExpense";
  script.onerror = function() {
    showContent("支出明細", "❌ 讀取失敗");
  };
  document.body.appendChild(script);
}
function toggleExpenseDetail(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.style.display = (el.style.display === "none" || el.style.display === "")
    ? "block"
    : "none";
} 
function deleteLeave() {
  const date = prompt("請輸入日期（格式：2026-04-23）");
  if (!date) return;

  const name = prompt("請輸入姓名");
  if (!name) return;

  window.handleDeleteLeave = function(res) {
    if (res.ok) {
      alert("刪除成功");
    } else {
      alert("❌ " + res.message);
    }
  };

  const script = document.createElement("script");
  script.src = GAS_URL
    + "?action=deleteLeave"
    + "&name=" + encodeURIComponent(name)
    + "&date=" + encodeURIComponent(date)
    + "&callback=handleDeleteLeave";

  document.body.appendChild(script);
}    
    main();
  </script>
</body>
</html>
