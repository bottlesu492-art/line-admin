<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>管理後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
  :root {
    --primary: #586D80;
    --accent: #CCC5BC;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text-main: #2E3A45;
    --text-sub: #666666;
  }

  body {
    font-family: Arial, "Noto Sans TC", sans-serif;
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--text-main);
  }

  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,.08);
    margin-bottom: 16px;
  }

  .title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .sub {
    color: var(--text-sub);
    margin-bottom: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  button {
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 16px;
    font-weight: bold;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }

  .back {
    background: var(--accent);
    color: var(--text-main);
    margin-bottom: 12px;
  }

  .hidden {
    display: none;
  }

  .item {
    padding: 12px 0;
    border-bottom: 1px solid #eee;
    font-size: 16px;
  }

  .highlight {
    background: var(--accent);
    border-radius: 12px;
    padding: 12px;
    font-weight: bold;
    margin-top: 10px;
  }
    .center {
  text-align: center;
}

.icon {
  font-size: 40px;
  margin-bottom: 8px;
}
</style>
</head>
<body>
  <div id="loginPage" class="card">
    <div class="title">管理後台</div>
    <div id="status" class="sub">初始化中...</div>
  </div>

  <div id="homePage" class="hidden">
    <div class="card">
      <div class="title">管理後台</div>
      <div id="welcomeText" class="sub"></div>
      <div class="grid">
        <button onclick="showTodayPage()">今日管理</button>
        <button onclick="showLeavePage()">排休管理</button>
        <button onclick="showPatchPage()">補打卡管理</button>
        <button onclick="showEmployeePage()">員工薪資</button>
        <button onclick="showSummaryPage()">人事總額</button>
        <button onclick="showExpensePage()">支出明細</button>
      </div>
    </div>
  </div>

  <div id="contentPage" class="hidden">
    <button class="back" onclick="goHome()">← 返回首頁</button>
    <div class="card">
      <div id="contentTitle" class="title"></div>
      <div id="contentBody"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009831016-9xQbInBY";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzPOpbhtiLEKyomI4vbt65Qih-DzPSUR1v_sZcVwM4QpFGIvqz7UxA-l-03XZAdv_2y/exec";

    function loadUI() {
  window.handleUI = function(data) {
    document.documentElement.style.setProperty('--primary', data.button || data.primary || '#586D80');
    document.documentElement.style.setProperty('--accent', data.accent || '#CCC5BC');
    document.documentElement.style.setProperty('--text-main', data.title || '#2E3A45');
    document.documentElement.style.setProperty('--text-sub', data.subText || '#666666');
    document.documentElement.style.setProperty('--card', data.cardBg || '#ffffff');
    document.documentElement.style.setProperty('--bg', data.hintBg || '#f5f7fa');
  };

  const script = document.createElement("script");
  script.src = GAS_URL + "?action=getUI&callback=handleUI";
  document.body.appendChild(script);
}
    
    let currentProfile = null;
    let currentUserId = "";

    async function main() {
      try {
        document.getElementById("status").textContent = "1. 開始初始化 LIFF...";
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        document.getElementById("status").textContent = "2. LIFF 初始化成功";

        if (!liff.isLoggedIn()) {
          document.getElementById("status").textContent = "3. 尚未登入，準備登入...";
          liff.login();
          return;
        }

        document.getElementById("status").textContent = "4. 已登入，讀取個人資料...";
        currentProfile = await liff.getProfile();
        currentUserId = currentProfile.userId;

        document.getElementById("status").textContent =
          "5. 驗證管理員中...";

        window.handleAdminCheck = function(data) {
          if (data.ok && data.isAdmin) {
            document.getElementById("loginPage").classList.add("hidden");
            document.getElementById("homePage").classList.remove("hidden");
            document.getElementById("welcomeText").textContent =
              "歡迎，" + currentProfile.displayName;
            loadUI();
          } else {
            document.getElementById("status").textContent =
              "❌ 你不在管理員名單內";
          }
        };

        const script = document.createElement("script");
        script.src = GAS_URL
          + "?action=checkAdmin"
          + "&userId=" + encodeURIComponent(currentUserId)
          + "&callback=handleAdminCheck";

        script.onerror = function() {
          document.getElementById("status").textContent =
            "❌ 管理員驗證失敗";
        };

        document.body.appendChild(script);

      } catch (err) {
        document.getElementById("status").textContent =
          "❌ 初始化錯誤：" + (err && err.message ? err.message : JSON.stringify(err));
      }
    }

    function goHome() {
      document.getElementById("contentPage").classList.add("hidden");
      document.getElementById("homePage").classList.remove("hidden");
    }

    function showContent(title, html) {
      document.getElementById("homePage").classList.add("hidden");
      document.getElementById("contentPage").classList.remove("hidden");
      document.getElementById("contentTitle").textContent = title;
      document.getElementById("contentBody").innerHTML = html;
    }

    function showTodayPage() {
      showContent("今日管理", "之後接今日記錄 / 今日異常");
    }

    function showLeavePage() {
      showContent("排休管理", "之後接排休月曆或試算表連結");
    }

    function showPatchPage() {
      showContent("補打卡管理", "之後接待審核補打卡列表");
    }

    function showEmployeePage() {
      showContent("員工薪資", "之後接員工清單與個人薪資資料");
    }

function showSummaryPage() {
  window.handleSummary = function(data) {
    const html = `
      <div class="grid">

        <div class="card center">
          <div class="icon">💰</div>
          <div class="sub">管理員薪資</div>
          <div class="title">${data.managerSalary}</div>
        </div>

        <div class="card center">
          <div class="icon">👷</div>
          <div class="sub">員工薪資</div>
          <div class="title">${data.employeeSalary}</div>
        </div>

        <div class="card center">
          <div class="icon">💳</div>
          <div class="sub">代墊</div>
          <div class="title">${data.expenseTotal}</div>
        </div>

        <div class="card center">
          <div class="icon">🍱</div>
          <div class="sub">餐飲</div>
          <div class="title">${data.foodTotal}</div>
        </div>

        <div class="card center">
          <div class="icon">🧰</div>
          <div class="sub">工具</div>
          <div class="title">${data.toolTotal}</div>
        </div>

        <div class="card center">
          <div class="icon">📦</div>
          <div class="sub">其他</div>
          <div class="title">${data.otherTotal}</div>
        </div>

      </div>

      <div class="highlight">🔥 總支出：${data.grandTotal}</div>
    `;

    showContent("人事總額", html);
  };

  const script = document.createElement("script");
  script.src = GAS_URL + "?action=getSummary&callback=handleSummary";
  script.onerror = function() {
    showContent("人事總額", "❌ 讀取失敗");
  };
  document.body.appendChild(script);
}
    function showExpensePage() {
  window.handleExpense = function(data) {
    let html = "";

    // 👉 依人名排序（固定順序）
    const names = Object.keys(data).sort();

    names.forEach(name => {
      html += `<div class="card">`;
      html += `<div class="title">👤 ${name}</div>`;

      // 👉 最新在上
      const list = data[name].reverse();

      list.forEach(item => {

        // 🎨 分類顏色
        let typeColor = "#666";
        let typeIcon = "📦";

        if (item.type === "餐飲") {
          typeColor = "#4CAF50";
          typeIcon = "🍱";
        } else if (item.type === "工具") {
          typeColor = "#2196F3";
          typeIcon = "🧰";
        } else if (item.type === "其他") {
          typeColor = "#9E9E9E";
          typeIcon = "📦";
        }

        html += `
          <div class="item">
            <div style="color:${typeColor};font-weight:bold;">
              ${typeIcon} ${item.type}
            </div>

            <div style="font-size:13px;color:#999;">
              ${item.time}
            </div>

            <div>
              ${item.note || ""}
            </div>

            <div style="font-weight:bold;margin-top:4px;">
              $${item.amount}
            </div>
          </div>
        `;
      });

      html += `</div>`;
    });

    showContent("支出明細", html);
  };

  const script = document.createElement("script");
  script.src = GAS_URL + "?action=getExpenseList&callback=handleExpense";
  script.onerror = function() {
    showContent("支出明細", "❌ 讀取失敗");
  };
  document.body.appendChild(script);
}
    main();
  </script>
</body>
</html>
