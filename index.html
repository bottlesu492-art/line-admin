<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>管理後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1 id="title">管理後台</h1>
  <p id="status">初始化中...</p>

  <script>
    const LIFF_ID = "2009831016-9xQbInBY";

    async function main() {
      try {
        document.getElementById("status").textContent = "1. 開始初始化 LIFF...";
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        document.getElementById("status").textContent = "2. LIFF 初始化成功";

        if (!liff.isLoggedIn()) {
          document.getElementById("status").textContent = "3. 尚未登入，準備登入...";
          liff.login();
          return;
        }

        document.getElementById("status").textContent = "4. 已登入，讀取個人資料...";

        let profile;
        try {
          profile = await liff.getProfile();
        } catch (err) {
          document.getElementById("title").textContent = "Profile 錯誤";
          document.getElementById("status").textContent =
            "❌ getProfile 失敗：" + (err && err.message ? err.message : JSON.stringify(err));
          return;
        }

        const userId = profile.userId;

        document.getElementById("status").textContent =
          "5. 取得 userId 成功：" + userId;

        fetch("https://script.google.com/macros/s/AKfycbxjWbzpbtHvQKZZgbciBL9UF-8gO2wv330kcLP_sIN8ZXBrCxsPWBm1REzEhlwRK8fx/exec?action=checkAdmin&userId=" + encodeURIComponent(userId))
          .then(res => res.json())
          .then(data => {
            if (data.ok && data.isAdmin) {
              document.getElementById("title").textContent = "管理後台";
              document.getElementById("status").textContent =
                "✅ 歡迎進入管理後台：" + profile.displayName;
            } else {
              document.getElementById("title").textContent = "無權限";
              document.getElementById("status").textContent =
                "❌ 你不在管理員名單內 / " + userId;
            }
          })
          .catch(err => {
            document.getElementById("title").textContent = "GAS 錯誤";
            document.getElementById("status").textContent =
              "❌ fetch GAS 失敗：" + (err && err.message ? err.message : err);
          });

      } catch (err) {
        document.getElementById("title").textContent = "初始化錯誤";
        document.getElementById("status").textContent =
          "❌ LIFF 初始化失敗：" + (err && err.message ? err.message : JSON.stringify(err));
      }
    }

    main();
  </script>
</body>
</html>
